<!DOCTYPE html>
<html>
<head>
  <title>Assignment System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loginPage" class="container" style="max-width:400px; margin-top:100px;">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <select id="role">
      <option value="student">Student</option>
      <option value="faculty">Faculty</option>
    </select>
    <button onclick="login()">Login</button>
    <p class="msg" id="loginMsg"></p>
  </div>

  <div id="facultyPage" class="container" style="display:none;">
    <h2>Faculty Dashboard
      <button class="logout" onclick="logout()">Logout</button>
    </h2>

    <h3>Create Assignment</h3>
    <input type="text" id="title" placeholder="Title" />
    <input type="text" id="course" placeholder="Course" />
    <input type="date" id="due_date" />
    <textarea id="description" placeholder="Description" rows="3"></textarea>
    <button onclick="createAssignment()">Create</button>
    <p class="msg" id="createMsg"></p>

    <h3>All Submissions</h3>
    <button onclick="loadSubmissions()">Refresh</button>
    <table>
      <thead>
        <tr><th>Student</th><th>Assignment</th><th>Answer</th><th>Date</th><th>Status</th><th>Marks</th><th>Action</th></tr>
      </thead>
      <tbody id="submissionsTable"></tbody>
    </table>
  </div>

  <div id="studentPage" class="container" style="display:none;">
    <h2>Student Dashboard
      <button class="logout" onclick="logout()">Logout</button>
    </h2>

    <h3>Available Assignments</h3>
    <button onclick="loadAssignments()">Load Assignments</button>
    <table>
      <thead>
        <tr><th>Title</th><th>Course</th><th>Due Date</th><th>Description</th></tr>
      </thead>
      <tbody id="assignmentsTable"></tbody>
    </table>

    <h3>Submit Assignment</h3>
    <select id="assignment_title">
      <option value="">-- Select Assignment --</option>
    </select>
    <textarea id="answer" placeholder="Your Answer" rows="4"></textarea>
    <button onclick="submitAssignment()">Submit</button>
    <p class="msg" id="submitMsg"></p>

    <h3>My Submissions</h3>
    <button onclick="loadMySubmissions()">Refresh</button>
    <table>
      <thead>
        <tr><th>Assignment</th><th>Date</th><th>Status</th><th>Marks</th></tr>
      </thead>
      <tbody id="myTable"></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
